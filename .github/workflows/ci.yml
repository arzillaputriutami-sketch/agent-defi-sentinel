name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip pytest
      - run: python -m pytest -q
      - run: python backend/swarm.py > /tmp/swarm.json
      - run: python -m json.tool /tmp/swarm.json >/dev/null
      - run: python cli.py --scenario "oracle feed divergence" > /tmp/defi-cli.json
      - run: python -m json.tool /tmp/defi-cli.json >/dev/null
      - run: python cli.py --signals examples/operator_override.json --format markdown | grep "Agent findings"
